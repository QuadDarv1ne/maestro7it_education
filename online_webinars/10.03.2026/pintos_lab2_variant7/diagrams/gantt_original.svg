<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .title { font: bold 18px sans-serif; }
      .label { font: 14px sans-serif; }
      .tick-label { font: 12px sans-serif; fill: #666; }
      .process-label { font: bold 14px sans-serif; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Диаграмма Ганта: Исходный алгоритм Pintos (FIFO)</text>
  
  <!-- Grid -->
  <line x1="150" y1="60" x2="750" y2="60" stroke="#ccc" stroke-width="1"/>
  <line x1="150" y1="340" x2="750" y2="340" stroke="#ccc" stroke-width="1"/>
  
  <!-- Time axis -->
  <text x="150" y="360" class="tick-label">0</text>
  <text x="225" y="360" class="tick-label">5</text>
  <text x="300" y="360" class="tick-label">10</text>
  <text x="375" y="360" class="tick-label">15</text>
  <text x="450" y="360" class="tick-label">20</text>
  <text x="525" y="360" class="tick-label">25</text>
  <text x="600" y="360" class="tick-label">30</text>
  <text x="675" y="360" class="tick-label">32</text>
  
  <!-- Time axis label -->
  <text x="450" y="385" text-anchor="middle" class="label">Время (тики)</text>
  
  <!-- Process labels -->
  <text x="80" y="100" class="process-label">Proc0</text>
  <text x="80" y="115" class="tick-label">prio=27</text>
  
  <text x="80" y="170" class="process-label">Proc1</text>
  <text x="80" y="185" class="tick-label">prio=7</text>
  
  <text x="80" y="240" class="process-label">Proc2</text>
  <text x="80" y="255" class="tick-label">prio=8</text>
  
  <text x="80" y="310" class="process-label">Proc3</text>
  <text x="80" y="325" class="tick-label">prio=18</text>
  
  <!-- FIFO Order: Proc0(3) -> Proc1(8) -> Proc2(20) -> Proc3(1) -->
  
  <!-- Proc0: 0-3 (FIFO - первый создан) -->
  <rect x="150" y="85" width="45" height="30" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <text x="172" y="105" text-anchor="middle" class="label" fill="white">0-3</text>
  
  <!-- Proc1: 3-11 -->
  <rect x="195" y="155" width="120" height="30" fill="#F44336" stroke="#C62828" stroke-width="2"/>
  <text x="255" y="175" text-anchor="middle" class="label" fill="white">3-11</text>
  
  <!-- Proc2: 11-31 -->
  <rect x="315" y="225" width="300" height="30" fill="#2196F3" stroke="#1565C0" stroke-width="2"/>
  <text x="465" y="245" text-anchor="middle" class="label" fill="white">11-31</text>
  
  <!-- Proc3: 31-32 -->
  <rect x="615" y="295" width="15" height="30" fill="#FF9800" stroke="#EF6C00" stroke-width="2"/>
  <text x="622" y="315" text-anchor="middle" class="label" fill="white" font-size="10">31-32</text>
  
  <!-- Legend -->
  <rect x="150" y="50" width="15" height="15" fill="#4CAF50"/>
  <text x="170" y="62" class="tick-label">Proc0 (burst=3)</text>
  
  <rect x="280" y="50" width="15" height="15" fill="#F44336"/>
  <text x="300" y="62" class="tick-label">Proc1 (burst=8)</text>
  
  <rect x="410" y="50" width="15" height="15" fill="#2196F3"/>
  <text x="430" y="62" class="tick-label">Proc2 (burst=20)</text>
  
  <rect x="540" y="50" width="15" height="15" fill="#FF9800"/>
  <text x="560" y="62" class="tick-label">Proc3 (burst=1)</text>
</svg>